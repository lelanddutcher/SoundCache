[project]
name = "sound-vault-desktop"
version = "0.1.0"
description = "Local-first TikTok Sound Vault desktop app and pairing-code relay."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115",
  "uvicorn>=0.30",
  "pydantic>=2.8",
  "httpx>=0.27",
  "watchdog>=4.0",
  "PySide6>=6.7",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.2",
  "ruff>=0.6",
]

[project.scripts]
sound-vault = "sound_vault.app:main"
sound-vault-relay = "sound_vault.relay.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"
